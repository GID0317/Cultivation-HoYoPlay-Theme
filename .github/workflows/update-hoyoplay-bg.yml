name: Update HoYoPlay Backgrounds

on:
  schedule:
    - cron: '0 3 * * *'    # daily at 03:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-backgrounds:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create scripts folder
        run: mkdir -p .github/scripts

      - name: Install ImageMagick (for color extraction)
        run: sudo apt-get update && sudo apt-get install -y imagemagick

      - name: Write updater script
        run: |
          cat > .github/scripts/update-hoyoplay-bg.js <<'EOF'
          const fs = require('fs');
          const path = require('path');
          const crypto = require('crypto');

          (async () => {
            try {
              const API = 'https://sg-hyp-api.hoyoverse.com/hyp/hyp-connect/api/getAllGameBasicInfo?launcher_id=VYTpXlbWo8&language=en-us&game_id=gopR6Cufr3';
              const outDir = path.join(process.cwd(), 'Background');
              if (!fs.existsSync(outDir)) fs.mkdirSync(outDir, { recursive: true });

              console.log('Fetching API...');
              const res = await fetch(API, { headers: { 'User-Agent': 'github-action' } });
              if (!res.ok) throw new Error('API fetch failed ' + res.status);
              const j = await res.json();
              const list = j?.data?.game_info_list || [];
              if (!list.length) throw new Error('no game_info_list');
              const backgrounds = list[0].backgrounds || [];
              const backgroundSlots = backgrounds
                .map(b => ({
                  image: (b && b.background && b.background.url) || b?.url || '',
                  video: (b && b.video && b.video.url) || '',
                  overlay: (b && b.theme && b.theme.url) || '',
                  link: (b && b.link && b.link.url) || '',
                  linkHover: (b && b.link_hover && b.link_hover.url) || ''
                }))
                .filter(slot => slot.image);
              if (backgroundSlots.length < 3) throw new Error(`expected at least 3 background slots, got ${backgroundSlots.length}`);
              const runtimeCircleCount = Math.min(backgroundSlots.length, 4);

              if (!backgroundSlots.length) throw new Error('no background urls found');

              // Also extract icon from the primary background entry (if present)
              const primary = backgrounds[0] || {};
              const iconUrl = (primary.icon && primary.icon.url) || '';
              const iconHoverUrl = (primary.icon && primary.icon.hover_url) || '';

              function hashBuffer(buf) {
                return crypto.createHash('sha256').update(buf).digest('hex');
              }

              function readFileBufferIfExists(p) {
                try { return fs.existsSync(p) ? fs.readFileSync(p) : null; } catch { return null; }
              }

              async function downloadTo(url, outPath) {
                console.log('Downloading', url);
                const r = await fetch(url, { headers: { 'User-Agent': 'github-action' } });
                if (!r.ok) throw new Error('download failed ' + r.status);
                const buf = Buffer.from(await r.arrayBuffer());
                const prev = readFileBufferIfExists(outPath);
                if (prev && prev.length === buf.length && hashBuffer(prev) === hashBuffer(buf)) {
                  console.log('Unchanged', outPath);
                  return false; // not written
                }
                fs.writeFileSync(outPath, buf);
                console.log(prev ? 'Updated' : 'Saved', outPath);
                return true; // written
              }

              function removeIfExists(outPath) {
                try {
                  if (fs.existsSync(outPath)) {
                    fs.unlinkSync(outPath);
                    console.log('Removed', outPath);
                  }
                } catch (e) {
                  console.warn('Failed to remove', outPath, e.message);
                }
              }

              function removeStaleNumberedFiles(prefix, suffix, keepCount) {
                try {
                  const escapedPrefix = prefix.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                  const escapedSuffix = suffix.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                  const re = new RegExp(`^${escapedPrefix}(\\d+)${escapedSuffix}$`);
                  for (const name of fs.readdirSync(outDir)) {
                    const match = name.match(re);
                    if (match && parseInt(match[1], 10) > keepCount) {
                      removeIfExists(path.join(outDir, name));
                    }
                  }
                } catch (e) {
                  console.warn(`Failed to remove stale ${prefix}*${suffix} files`, e.message);
                }
              }

              const imagePaths = backgroundSlots.map((_, i) => path.join(outDir, `image${i + 1}.webp`));
              for (let i = 0; i < backgroundSlots.length; i++) {
                const imagePath = imagePaths[i];
                await downloadTo(backgroundSlots[i].image, imagePath);
              }
              removeStaleNumberedFiles('image', '.webp', backgroundSlots.length);

              const sourceIndexPath = path.join(process.cwd(), 'source', 'index.js');
              const countPattern = /const HOYO_CIRCLE_COUNT = \d+; \/\/ AUTO-UPDATED BY HOYOPLAY ASSET WORKFLOW/;
              const sourceIndex = fs.readFileSync(sourceIndexPath, 'utf8');
              if (countPattern.test(sourceIndex)) {
                const nextSourceIndex = sourceIndex.replace(
                  countPattern,
                  `const HOYO_CIRCLE_COUNT = ${runtimeCircleCount}; // AUTO-UPDATED BY HOYOPLAY ASSET WORKFLOW`
                );
                if (nextSourceIndex !== sourceIndex) {
                  fs.writeFileSync(sourceIndexPath, nextSourceIndex);
                  console.log('Updated runtime background count to', runtimeCircleCount);
                }
              } else {
                console.log('Skipping runtime background count update: HOYO_CIRCLE_COUNT marker not present in source/index.js');
              }

              // Download per-circle video/overlay assets if available
              const videoPaths = backgroundSlots.map((_, i) => path.join(outDir, `video${i + 1}.webm`));
              const overlayPaths = backgroundSlots.map((_, i) => path.join(outDir, `overlay${i + 1}.webp`));
              const iconPath = path.join(outDir, 'icon.png');
              const iconHoverPath = path.join(outDir, 'icon-hover.png');
              const linkPaths = backgroundSlots.map((_, i) => path.join(outDir, `link${i + 1}.png`));
              const linkHoverPaths = backgroundSlots.map((_, i) => path.join(outDir, `link-hover${i + 1}.png`));
              for (let i = 0; i < backgroundSlots.length; i++) {
                const vUrl = backgroundSlots[i].video;
                const oUrl = backgroundSlots[i].overlay;
                const vPath = videoPaths[i];
                const oPath = overlayPaths[i];
                const lUrl = backgroundSlots[i].link;
                const lhUrl = backgroundSlots[i].linkHover;
                if (vUrl) {
                  try { await downloadTo(vUrl, vPath); } catch(e) { console.warn(`video${i+1} download failed`, e.message); removeIfExists(vPath); }
                } else {
                  removeIfExists(vPath);
                }
                if (oUrl) {
                  try { await downloadTo(oUrl, oPath); } catch(e) { console.warn(`overlay${i+1} download failed`, e.message); removeIfExists(oPath); }
                } else {
                  removeIfExists(oPath);
                }
                if (lUrl) {
                  try { await downloadTo(lUrl, linkPaths[i]); } catch(e) { console.warn(`link${i+1} download failed`, e.message); removeIfExists(linkPaths[i]); }
                } else {
                  removeIfExists(linkPaths[i]);
                }
                if (lhUrl) {
                  try { await downloadTo(lhUrl, linkHoverPaths[i]); } catch(e) { console.warn(`link-hover${i+1} download failed`, e.message); removeIfExists(linkHoverPaths[i]); }
                } else {
                  removeIfExists(linkHoverPaths[i]);
                }
              }
              removeStaleNumberedFiles('video', '.webm', backgroundSlots.length);
              removeStaleNumberedFiles('overlay', '.webp', backgroundSlots.length);
              removeStaleNumberedFiles('link', '.png', backgroundSlots.length);
              removeStaleNumberedFiles('link-hover', '.png', backgroundSlots.length);
              if (iconUrl) {
                try { await downloadTo(iconUrl, iconPath); } catch(e) { console.warn('icon download failed', e.message); removeIfExists(iconPath); }
              } else {
                removeIfExists(iconPath);
              }
              if (iconHoverUrl) {
                try { await downloadTo(iconHoverUrl, iconHoverPath); } catch(e) { console.warn('icon-hover download failed', e.message); removeIfExists(iconHoverPath); }
              } else {
                removeIfExists(iconHoverPath);
              }

              // Compute dominant colors from link/link-hover images using ImageMagick
              function getHexFromImage(imgPath) {
                try {
                  const { execSync } = require('child_process');
                  // Average the image to 1x1 then read that pixel in hex (RRGGBB)
                  const cmd = `convert "${imgPath}" -resize 1x1! -format "%[hex:u.p{0,0}]" info:`;
                  const out = String(execSync(cmd)).trim();
                  if (/^[0-9A-Fa-f]{6}$/.test(out)) return '#' + out.toUpperCase();
                } catch (e) {
                  console.warn('convert failed for', imgPath, e.message);
                }
                return '';
              }

              const colors = { circles: [] };
              for (let i = 0; i < backgroundSlots.length; i++) {
                const linkP = linkPaths[i];
                const linkHoverP = linkHoverPaths[i];
                const c = {
                  link: fs.existsSync(linkP) ? getHexFromImage(linkP) : '',
                  hover: fs.existsSync(linkHoverP) ? getHexFromImage(linkHoverP) : ''
                };
                // Fallbacks: if hover missing, use link; if link missing, use hover
                if (!c.link && c.hover) c.link = c.hover;
                if (!c.hover && c.link) c.hover = c.link;
                // If still empty, default to white to match requested fallback
                if (!c.link) c.link = '#FFFFFF';
                if (!c.hover) c.hover = c.link;
                colors.circles.push(c);
              }
              const colorsJsonPath = path.join(outDir, 'circle-colors.json');
              const colorsJsonNew = JSON.stringify(colors, null, 2);
              try {
                const prev = fs.existsSync(colorsJsonPath) ? fs.readFileSync(colorsJsonPath, 'utf8') : '';
                if (prev !== colorsJsonNew) {
                  fs.writeFileSync(colorsJsonPath, colorsJsonNew);
                  console.log('Wrote', colorsJsonPath);
                } else {
                  console.log('Unchanged', colorsJsonPath);
                }
              } catch (e) {
                fs.writeFileSync(colorsJsonPath, colorsJsonNew);
              }

              // Also emit 1x1 PNG swatches for CSP-safe client reads
              try {
                const { execSync } = require('child_process');
                for (let i = 0; i < backgroundSlots.length; i++) {
                  const hex = colors.circles[i]?.link || '#FFFFFF';
                  const outP = path.join(outDir, `color${i+1}.png`);
                  // Create a deterministic 1x1 image filled with the hex color (no time/meta chunks)
                  const tmpP = path.join(outDir, `.__tmp_color${i+1}.png`);
                  execSync(`convert -strip -define png:exclude-chunk=time -size 1x1 xc:${hex} "${tmpP}"`);
                  try {
                    const bufNew = fs.readFileSync(tmpP);
                    const bufPrev = readFileBufferIfExists(outP);
                    if (!bufPrev || hashBuffer(bufPrev) !== hashBuffer(bufNew)) {
                      fs.renameSync(tmpP, outP);
                      console.log('Updated', outP);
                    } else {
                      fs.unlinkSync(tmpP);
                      console.log('Unchanged', outP);
                    }
                  } catch (e) {
                    // If compare failed, at least move the file into place
                    try { fs.renameSync(tmpP, outP); } catch {}
                  }
                }
              } catch (e) {
                console.warn('Failed to create color swatch images', e.message);
              }
              removeStaleNumberedFiles('color', '.png', backgroundSlots.length);

              // commit & push changes (only if there are actual diffs)
              const execSync = require('child_process').execSync;
              execSync('git config user.name "github-actions[bot]"');
              execSync('git config user.email "41898282+github-actions[bot]@users.noreply.github.com"');
              // Stage generated assets and the deterministic runtime count.
              execSync('git add -A Background source/index.js');
              try {
                execSync('git diff --cached --quiet')
                console.log('No changes to commit');
              } catch (_) {
                execSync(`git commit -m "Auto-update HoYoPlay assets (${backgroundSlots.length} background slots)"`);
                execSync('git push');
              }
              console.log('Done');
            } catch (e) {
              console.error(e);
              process.exit(1);
            }
          })();
          EOF

      - name: Run updater
        env:
          NODE_OPTIONS: --unhandled-rejections=strict
        run: node .github/scripts/update-hoyoplay-bg.js
